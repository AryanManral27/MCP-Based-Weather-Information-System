<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather — London</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            transition: background 0.6s ease;
        }
        
        .container {
            width: 100%;
            max-width: 520px;
        }
        
        .search-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        
        .search-form input {
            flex: 1;
            padding: 0.85rem 1rem;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.92);
            color: #1a1a2e;
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        }
        
        .search-form button {
            padding: 0.85rem 1.25rem;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.35);
            transition: background 0.2s, transform 0.15s;
        }
        
        .search-form button:hover {
            background: rgba(255, 255, 255, 0.38);
            transform: translateY(-1px);
        }
        
        .error-msg {
            background: rgba(220, 53, 69, 0.85);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hero {
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }
        
        .city {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }
        
        .local-time {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 1.25rem;
        }
        
        .weather-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .weather-icon {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }
        
        .temp-block {
            text-align: left;
        }
        
        .temp {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.04em;
        }
        
        .temp sup {
            font-size: 1.5rem;
            font-weight: 400;
            vertical-align: super;
        }
        
        .condition {
            font-size: 1.15rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .feels-like {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-top: 0.75rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.08);
            padding: 1.15rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        
        .stat-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            opacity: 0.75;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .aqi-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .aqi-good {
            background: #2ecc71;
            color: #fff;
        }
        
        .aqi-moderate {
            background: #f1c40f;
            color: #333;
        }
        
        .aqi-sensitive {
            background: #e67e22;
            color: #fff;
        }
        
        .aqi-unhealthy {
            background: #e74c3c;
            color: #fff;
        }
        
        .aqi-very-unhealthy {
            background: #9b59b6;
            color: #fff;
        }
        
        .aqi-hazardous {
            background: #7f0000;
            color: #fff;
        }
        
        .aqi-unknown {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .footer {
            padding: 1rem 1.5rem;
            text-align: center;
            font-size: 0.78rem;
            opacity: 0.7;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.1rem;
        }
        
        @media (max-width: 420px) {
            .temp {
                font-size: 3.2rem;
            }
            .hero {
                padding: 1.5rem 1.25rem 1rem;
            }
            .city {
                font-size: 1.25rem;
            }
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="card" id="weatherCard">
            <div class="hero">
                <div class="city">📍 London, City of London, Greater London, United Kingdom</div>
                <div class="local-time">Local time: 2026-06-13 13:46</div>
                <div class="weather-main">
                    <img class="weather-icon" src="https://cdn.weatherapi.com/weather/64x64/day/113.png" alt="Sunny" />
                    <div class="temp-block">
                        <div class="temp">19.1<sup>°C</sup></div>
                        <div class="condition">☀️ Sunny</div>
                    </div>
                </div>
                <div class="feels-like">🌡️ Feels like <strong>19.1°C</strong></div>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">💧 Humidity</span>
                    <span class="stat-value">49%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">💨 Wind Speed</span>
                    <span class="stat-value">19.4 km/h <small>(WNW)</small></span>
                </div>
                <div class="stat">
                    <span class="stat-label">👁️ Visibility</span>
                    <span class="stat-value">10.0 km</span>
                </div>
                <div class="stat">
                    <span class="stat-label">🌪️ Air Quality</span>
                    <span class="stat-value">
            <span class="aqi-badge aqi-good">Good</span>
                    <small style="opacity:0.8;margin-left:0.4rem;">AQI 1</small>
                    </span>
                </div>
            </div>
            <div class="footer">
                Last updated: 2026-06-13 13:30 · Page generated 2026-06-13 18:16:14
            </div>
        </div>
    </div>

</body>

</html>
